<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGent — Pipeline Diagnostics</title>
<style>
  :root {
    --bg: #f5f5f7;
    --bg2: #e8e8ed;
    --card: rgba(255,255,255,0.82);
    --text: #1d1d1f;
    --text2: #6e6e73;
    --text3: #8e8e93;
    --border: rgba(0,0,0,.06);
    --shadow: rgba(0,0,0,.04);
    --shadow-lg: rgba(0,0,0,.08);
    --accent: #007aff;
    --accent-light: rgba(0,122,255,.08);
    --red: #ff3b30;
    --orange: #ff9500;
    --green: #30d158;
    --radius: 12px;
    --radius-sm: 8px;
    --left-w: 340px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --card: rgba(44,44,46,0.85);
      --text: #f5f5f7;
      --text2: #a1a1a6;
      --text3: #8e8e93;
      --border: rgba(255,255,255,.06);
      --shadow: rgba(0,0,0,.2);
      --shadow-lg: rgba(0,0,0,.4);
      --accent-light: rgba(10,132,255,.12);
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #left {
    width: var(--left-w); min-width: var(--left-w);
    background: var(--card); backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: relative; z-index: 1;
  }
  #left-header { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
  #left-header h1 { font-size: 15px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  #search {
    width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; outline: none; background: var(--bg); color: var(--text);
    transition: border-color .2s, box-shadow .2s;
  }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  #search::placeholder { color: var(--text3); }
  .list-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .list-count { font-size: 11px; color: var(--text3); font-weight: 500; }
  #refresh-btn { font-size: 11px; font-weight: 500; color: var(--accent); cursor: pointer; background: none; border: none; padding: 4px 8px; border-radius: 6px; transition: background .15s; }
  #refresh-btn:hover { background: var(--accent-light); }
  #query-list { flex: 1; overflow-y: auto; padding: 8px; }
  #query-list::-webkit-scrollbar { width: 4px; }
  #query-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .query-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 3px; transition: background .15s, transform .12s; }
  .query-item:hover { background: var(--bg); transform: translateX(2px); }
  .query-item.active { background: var(--accent-light); }
  .query-item:active { transform: scale(.97); }
  .qi-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .qi-query { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qi-time { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .qi-meta { font-size: 11px; color: var(--text3); display: flex; gap: 10px; }
  .qi-badge { font-size: 9px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .qi-badge.ok { background: #e8f8ed; color: #248a3d; }
  .qi-badge.warn { background: #fff3e0; color: #b86300; }
  .qi-badge.err { background: #ffe5e3; color: #bf2d1f; }
  @media (prefers-color-scheme: dark) {
    .qi-badge.ok { background: rgba(48,209,88,.15); color: #30d158; }
    .qi-badge.warn { background: rgba(255,149,0,.15); color: #ff9f0a; }
    .qi-badge.err { background: rgba(255,59,48,.15); color: #ff453a; }
  }
  #left-footer { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text3); }
  #right { flex: 1; overflow-y: auto; padding: 28px 32px; }
  #right::-webkit-scrollbar { width: 6px; }
  #right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); gap: 8px; }
  .empty-state .icon { font-size: 56px; opacity: .6; }
  .empty-state .label { font-size: 14px; font-weight: 500; }
  .empty-state .sublabel { font-size: 12px; opacity: .7; }
  .loading { text-align: center; padding: 60px 0; color: var(--text3); font-size: 13px; }
  .detail-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .detail-header .query-text { font-size: 20px; font-weight: 650; letter-spacing: -.02em; line-height: 1.3; margin-bottom: 6px; }
  .detail-header .query-meta { font-size: 12px; color: var(--text3); display: flex; gap: 18px; }
  .error-section-head { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .error-section-head .count { font-size: 11px; font-weight: 500; padding: 1px 8px; border-radius: 20px; background: rgba(255,59,48,.1); color: var(--red); }
  .error-item { background: rgba(255,59,48,.04); border: 1px solid rgba(255,59,48,.12); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; font-size: 13px; transition: background .15s; }
  .error-item:hover { background: rgba(255,59,48,.07); }
  .error-item .err-type { font-weight: 600; color: var(--red); font-size: 12px; margin-bottom: 2px; }
  .error-item .err-msg { color: var(--text2); }
  .error-item .err-meta { color: var(--text3); font-size: 11px; margin-top: 4px; }
  .steps-section-head { font-size: 14px; font-weight: 600; margin: 20px 0 12px; display: flex; align-items: center; gap: 6px; }
  .step-card {
    background: var(--card); backdrop-filter: blur(10px);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 3px var(--shadow);
    transition: box-shadow .2s, transform .12s;
  }
  .step-card:hover { box-shadow: 0 4px 12px var(--shadow-lg); }
  .step-card.degraded { border-left: 3px solid var(--orange); }
  .step-card.failed { border-left: 3px solid var(--red); }
  .step-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .step-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .step-status { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .step-status.ok { background: rgba(48,209,88,.1); color: var(--green); }
  .step-status.warn { background: rgba(255,149,0,.12); color: var(--orange); }
  .step-status.err { background: rgba(255,59,48,.1); color: var(--red); }
  .step-elapsed { font-size: 11px; color: var(--text3); }
  .step-data { font-size: 12px; color: var(--text2); max-height: 320px; overflow-y: auto; }
  .step-data::-webkit-scrollbar { width: 4px; }
  .step-data::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .step-data pre {
    background: var(--bg); border-radius: 8px; padding: 12px 14px; font-size: 11px; line-height: 1.5;
    overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    border: 1px solid var(--border);
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
  }
  /* Chunk modal */
  .chunk-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:100; backdrop-filter:blur(4px); }
  .chunk-panel { position:fixed; top:10%; left:50%; transform:translateX(-50%); width:700px; max-width:90vw; max-height:80vh; background:var(--card); border-radius:16px; padding:24px; overflow-y:auto; z-index:101; box-shadow:0 20px 60px var(--shadow-lg); border:1px solid var(--border); }
  .chunk-panel h3 { font-size:15px; font-weight:600; margin-bottom:12px; }
  .chunk-panel .cp-meta { font-size:12px; color:var(--text3); margin-bottom:12px; display:flex; gap:14px; flex-wrap:wrap; }
  .chunk-panel .cp-section { font-size:12px; color:var(--text2); background:var(--bg); padding:6px 10px; border-radius:6px; margin-bottom:10px; }
  .chunk-panel .cp-text { font-size:13px; line-height:1.6; white-space:pre-wrap; background:var(--bg); border-radius:8px; padding:14px; max-height:350px; overflow-y:auto; border:1px solid var(--border); }
  .chunk-panel .close-btn { float:right; background:none; border:none; font-size:20px; color:var(--text3); cursor:pointer; padding:4px 8px; border-radius:6px; }
  .chunk-panel .close-btn:hover { background:var(--bg); }
  .chunk-link { color:var(--accent); cursor:pointer; text-decoration:underline; font-size:11px; }
  .chunk-link:hover { opacity:.7; }
</style>
</head>
<body>

<div id="left">
  <div id="left-header">
    <h1>&#x1F4CA; Pipeline Diagnostics</h1>
    <input id="search" placeholder="搜索查询..." spellcheck="false" />
    <div class="list-bar">
      <span class="list-count" id="list-count">0 条记录</span>
      <button id="refresh-btn" onclick="loadIndex()">刷新</button>
    </div>
  </div>
  <div id="query-list"></div>
  <div id="left-footer">demo mode  ·  click a query to inspect</div>
</div>

<div id="right">
  <div class="empty-state">
    <div class="icon">&#x1F4E1;</div>
    <div class="label">选择一个查询</div>
    <div class="sublabel">点击左侧记录查看管线详情</div>
  </div>
</div>

<div id="chunk-overlay" class="chunk-overlay" onclick="closeChunk()"></div>
<div id="chunk-panel" class="chunk-panel" style="display:none">
  <button class="close-btn" onclick="closeChunk()">&times;</button>
  <h3 id="cp-head">Chunk</h3>
  <div class="cp-meta" id="cp-meta"></div>
  <div class="cp-section" id="cp-section"></div>
  <div class="cp-text" id="cp-text"></div>
</div>

<script>
/* ===== Inline demo data ===== */
var DEMO_INDEX = [
  { id: "q01", timestamp: "2026-06-25T14:30:15", query: "如何配置JWT密钥？", kbs: ["技术文档"], topk_count: 5, pipeline_elapsed_ms: 1850 },
  { id: "q02", timestamp: "2026-06-25T14:35:22", query: "JWT和Session鉴权有什么不同", kbs: ["安全指南","开发规范"], topk_count: 5, pipeline_elapsed_ms: 2200 },
  { id: "q03", timestamp: "2026-06-25T14:41:03", query: "什么是RAG技术", kbs: ["产品文档"], topk_count: 3, pipeline_elapsed_ms: 1200 },
  { id: "q04", timestamp: "2026-06-25T14:45:30", query: "帮我看看我的订单到哪里了", kbs: [], topk_count: 0, pipeline_elapsed_ms: 800 },
  { id: "q05", timestamp: "2026-06-25T14:52:01", query: "Embedding和Rerank的区别", kbs: ["技术文档"], topk_count: 4, pipeline_elapsed_ms: 3150 }
];

var DEMO_DETAIL = {
  id: "q02", timestamp: "2026-06-25T14:35:22", query: "JWT和Session鉴权有什么不同",
  conversation_id: "conv_abc12345", pipeline_elapsed_ms: 2200,
  errors: [
    { step: "rerank", type: "CircuitOpenError", message: "rerank circuit breaker open, skipped", retried: 0, degraded: true, elapsed_ms: 45.2 }
  ],
  steps: {
    rewrite: { original: "JWT和Session鉴权有什么不同", rewritten: "JWT(JSON Web Token)和Session会话鉴权的工作原理和区别对比", sub_questions: ["JWT鉴权的工作原理是什么","Session鉴权的工作原理是什么","JWT和Session鉴权的区别对比"] },
    intent: [
      { sub_query: "JWT鉴权的工作原理", kbs: [{ name: "安全指南", kb_id: "kb_01", confidence: 0.92 }], intent_type: "KB" },
      { sub_query: "Session鉴权的工作原理", kbs: [{ name: "安全指南", kb_id: "kb_01", confidence: 0.88 }], intent_type: "KB" },
      { sub_query: "JWT和Session鉴权的区别对比", kbs: [{ name: "安全指南", kb_id: "kb_01", confidence: 0.85 },{ name: "开发规范", kb_id: "kb_02", confidence: 0.65 }], intent_type: "KB" }
    ],
    retrieval: [{
      sub_query: "JWT鉴权的工作原理", target_kb_ids: ["kb_01"],
      embedding: { dims: 4096, elapsed_ms: 85.0, degraded: false },
      search_candidates: [{ chunk_id: "c_001", kb_id: "kb_01", score: 0.87, title: "JWT概述" },{ chunk_id: "c_003", kb_id: "kb_01", score: 0.76, title: "Token验证流程" }],
      rerank: { before_count: 20, after_count: 10, degraded: true, elapsed_ms: 0 },
      mmr: { selected_count: 5, rejected_count: 5, rejected_chunk_ids: ["c_007","c_012"], lambda: 0.7, elapsed_ms: 2.1 },
      total_elapsed_ms: 320.4
    }],
    topk: { chunks: [{ chunk_id: "c_001", title: "JWT概述", score: 0.87, source: "安全指南-v2.docx", text_preview: "JWT（JSON Web Token）是一种无状态的身份认证方案..." }] },
    prompt: { system_prompt_chars: 580, total_chars: 4230, message_count: 2, topk_chars: 2840 },
    stream: { first_token_ms: 320.5, total_tokens: 1260, total_ms: 1850.0, thinking_chars: 340, answer_chars: 920 }
  }
};

/* ===== App ===== */
var STEP_ICONS = { rejected: '\u{1F6AB}', rewrite: '\u{1F52E}', intent: '\u{1F3AF}', retrieval: '\u{1F50D}', topk: '\u{1F4E6}', prompt: '\u{1F4DD}', stream: '\u{1F4E1}', degraded: '\u{26A1}' };
var STEP_LABELS = { rejected: 'PII 拦截', rewrite: '查询改写', intent: '意图分类', retrieval: '检索', topk: '最终片段', prompt: 'Prompt 注入', stream: 'SSE 流', degraded: '降级事件' };
var currentId = null;

function loadIndex() {
  try {
    var index = DEMO_INDEX;
    document.getElementById('list-count').textContent = index.length + ' 条记录 (Demo)';
    renderList(index);
  } catch (e) {
    document.getElementById('query-list').innerHTML = '<div class="loading"><div style="font-size:28px;margin-bottom:8px">⚠️</div>无法加载数据</div>';
  }
}

function renderList(index) {
  var container = document.getElementById('query-list');
  var searchQ = document.getElementById('search').value.toLowerCase();
  var html = '';
  for (var i = 0; i < index.length; i++) {
    var item = index[i];
    if (searchQ && item.query.toLowerCase().indexOf(searchQ) < 0) continue;
    var hasErr = item.errors && item.errors.length > 0;
    var degraded = hasErr || (item.steps && item.steps.indexOf('degraded') >= 0);
    var badgeCls = hasErr ? 'err' : degraded ? 'warn' : 'ok';
    var badgeText = hasErr ? '异常' : degraded ? '降级' : '正常';
    var time = (item.timestamp && item.timestamp.split('T')[1]) ? item.timestamp.split('T')[1].slice(0,5) : (item.timestamp ? item.timestamp.slice(11,16) : '');
    html += '<div class="query-item' + (item.id === currentId ? ' active' : '') + '" onclick="loadDetail(\'' + item.id + '\')"><div class="qi-top">';
    html += '<span class="qi-badge ' + badgeCls + '">' + badgeText + '</span>';
    html += '<span class="qi-query">' + esc(item.query) + '</span><span class="qi-time">' + time + '</span></div>';
    html += '<div class="qi-meta">';
    if (item.kbs) html += '<span>📁 ' + item.kbs.join(',') + '</span>';
    if (item.topk_count) html += '<span>🔝 Top' + item.topk_count + '</span>';
    if (item.pipeline_elapsed_ms) html += '<span>⏱ ' + item.pipeline_elapsed_ms + 'ms</span>';
    html += '</div></div>';
  }
  container.innerHTML = html || '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">无匹配记录</div>';
}

function loadDetail(id) {
  currentId = id;
  document.getElementById('right').innerHTML = '<div class="loading">⏳ 加载中...</div>';
  document.querySelectorAll('.query-item').forEach(function(el) {
    el.classList.toggle('active', (el.getAttribute('onclick')||'').indexOf(id) >= 0);
  });
  loadIndex();
  renderDetail(DEMO_DETAIL);
}

function renderDetail(data) {
  var html = '';
  html += '<div class="detail-header"><div class="query-text">' + esc(data.query) + '</div>';
  html += '<div class="query-meta">';
  html += '<span>🕐 ' + (data.timestamp || '') + '</span>';
  if (data.pipeline_elapsed_ms != null) html += '<span>⏱ ' + data.pipeline_elapsed_ms + 'ms</span>';
  if (data.conversation_id) html += '<span>💬 ' + data.conversation_id.slice(0,8) + '</span>';
  html += '</div></div>';

  if (data.errors && data.errors.length > 0) {
    html += '<div><div class="error-section-head">⚠️ 错误与降级 <span class="count">' + data.errors.length + '</span></div>';
    for (var i = 0; i < data.errors.length; i++) {
      var err = data.errors[i];
      html += '<div class="error-item"><div class="err-type">' + esc(err.type) + ' &middot; ' + esc(err.step) + '</div>';
      html += '<div class="err-msg">' + esc(err.message) + '</div>';
      html += '<div class="err-meta">重试 ' + (err.retried || 0) + ' 次 &middot; 降级: ' + (err.degraded ? '是' : '否') + ' &middot; ' + (err.elapsed_ms || 0) + 'ms</div></div>';
    }
    html += '</div>';
  }

  if (data.steps) {
    var entries = Object.entries(data.steps);
    if (entries.length > 0) {
      html += '<div class="steps-section-head">📋 管线步骤</div>';
      for (var s = 0; s < entries.length; s++) {
        var stepName = entries[s][0];
        var stepData = entries[s][1];
        var hasStepErr = data.errors && data.errors.some(function(e) { return e.step === stepName; });
        var degradedFlag = stepData && stepData.degraded;
        var stepCls = hasStepErr ? 'failed' : degradedFlag ? 'degraded' : '';
        var icon = STEP_ICONS[stepName] || '📌';
        var label = STEP_LABELS[stepName] || stepName;
        var statusText = hasStepErr ? '失败' : degradedFlag ? '降级' : '正常';
        var statusCls = hasStepErr ? 'err' : degradedFlag ? 'warn' : 'ok';

        html += '<div class="step-card ' + stepCls + '"><div class="step-header">';
        html += '<div class="step-name">' + icon + ' ' + label + ' <span class="step-status ' + statusCls + '">' + statusText + '</span></div>';
        if (stepData && stepData.elapsed_ms != null) html += '<span class="step-elapsed">' + stepData.elapsed_ms + 'ms</span>';
        html += '</div>';

        if (stepData) {
          var display = {};
          for (var k in stepData) display[k] = stepData[k];
          if (display instanceof Array) {
            var preview = JSON.stringify(display.slice(0,2), null, 2);
            if (display.length > 2) preview += '\n  ... (+' + (display.length-2) + ' rounds)';
            html += '<div class="step-data"><pre>' + esc(preview) + '</pre></div>';
          } else {
            // Extract chunks list to show as clickable links
            var chunks = display.chunks;
            delete display.chunks;
            delete display.sub_questions;
            var simplified = {};
            for (var k in display) {
              var v = display[k];
              if (typeof v === 'string' && v.length > 500) simplified[k] = v.slice(0,500) + '...';
              else if (v instanceof Array && v.length > 10) simplified[k] = '[' + v.length + ' items]';
              else simplified[k] = v;
            }
            html += '<div class="step-data"><pre>' + esc(JSON.stringify(simplified, null, 2)) + '</pre></div>';
            // Render chunks as clickable table
            if (chunks && chunks instanceof Array && chunks.length > 0) {
              html += '<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;font-size:11px;color:var(--text3)">点击 chunk_id 查看详情:</div>';
              for (var ci = 0; ci < chunks.length; ci++) {
                var ch = chunks[ci];
                html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)">';
                html += '<span class="chunk-link" onclick="openChunk(\'' + esc(ch.chunk_id || '') + '\')">' + esc(ch.chunk_id || '') + '</span>';
                html += '<span style="color:var(--text2);min-width:50px;text-align:right">' + (ch.score != null ? ch.score : '') + '</span>';
                html += '<span style="color:var(--text3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(ch.title || ch.text_preview || '') + '</span>';
                html += '<span style="color:var(--text3);font-size:10px">' + esc(ch.source || '') + '</span>';
                html += '</div>';
              }
            }
          }
        }
        html += '</div>';
      }
    }
  }
  document.getElementById('right').innerHTML = html || '<div class="loading">无步骤数据</div>';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* Chunk lookup */
function openChunk(chunkId) {
  document.getElementById('chunk-overlay').style.display = 'block';
  document.getElementById('chunk-panel').style.display = 'block';
  document.getElementById('cp-head').textContent = '🔍 ' + chunkId;
  document.getElementById('cp-meta').innerHTML = '<span>⏳ 加载中...</span>';
  document.getElementById('cp-section').textContent = '';
  document.getElementById('cp-text').textContent = '';

  fetch('/api/v1/admin/chunks?ids=' + encodeURIComponent(chunkId))
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      if (data.length === 0) { document.getElementById('cp-meta').innerHTML = '<span>未找到该 chunk</span>'; return; }
      var c = data[0];
      document.getElementById('cp-meta').innerHTML = '<span>📄 ' + esc(c.filename) + '</span><span>🔗 ' + esc(c.document_id.slice(0,8)) + '</span><span>📁 ' + esc(c.kb_id) + '</span><span>🔐 ' + c.visibility + '</span>';
      document.getElementById('cp-section').textContent = c.section_path ? '📍 ' + c.section_path : '';
      document.getElementById('cp-text').textContent = c.text;
    })
    .catch(function(e) {
      document.getElementById('cp-meta').innerHTML = '<span style="color:var(--red)">⚠ 加载失败: ' + e.message + '</span>';
    });
}
function closeChunk() {
  document.getElementById('chunk-overlay').style.display = 'none';
  document.getElementById('chunk-panel').style.display = 'none';
}

document.getElementById('search').addEventListener('input', loadIndex);
loadIndex();
</script>
</body>
</html>
