<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGent — Pipeline Diagnostics</title>
<style>
  :root {
    --bg: #f5f5f7;
    --bg2: #e8e8ed;
    --card: rgba(255,255,255,0.82);
    --text: #1d1d1f;
    --text2: #6e6e73;
    --text3: #8e8e93;
    --border: rgba(0,0,0,.06);
    --shadow: rgba(0,0,0,.04);
    --shadow-lg: rgba(0,0,0,.08);
    --accent: #007aff;
    --accent-light: rgba(0,122,255,.08);
    --red: #ff3b30;
    --orange: #ff9500;
    --green: #30d158;
    --radius: 12px;
    --radius-sm: 8px;
    --left-w: 340px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --card: rgba(44,44,46,0.85);
      --text: #f5f5f7;
      --text2: #a1a1a6;
      --text3: #8e8e93;
      --border: rgba(255,255,255,.06);
      --shadow: rgba(0,0,0,.2);
      --shadow-lg: rgba(0,0,0,.4);
      --accent-light: rgba(10,132,255,.12);
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #left {
    width: var(--left-w); min-width: var(--left-w);
    background: var(--card); backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: relative; z-index: 1;
  }
  #left-header { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
  #left-header h1 { font-size: 15px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  #search {
    width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 13px; outline: none; background: var(--bg); color: var(--text);
    transition: border-color .2s, box-shadow .2s;
  }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  #search::placeholder { color: var(--text3); }
  .tab-bar { display:flex; gap:4px; margin:10px 0 8px; }
  .tab-btn { flex:1; padding:6px 10px; border:none; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; background:var(--bg); color:var(--text3); transition:background .15s,color .15s; }
  .tab-btn.active { background:var(--accent); color:#fff; }
  .tab-btn:hover:not(.active) { background:var(--bg2); }
  .list-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .list-count { font-size: 11px; color: var(--text3); font-weight: 500; }
  #refresh-btn { font-size: 11px; font-weight: 500; color: var(--accent); cursor: pointer; background: none; border: none; padding: 4px 8px; border-radius: 6px; transition: background .15s; }
  #refresh-btn:hover { background: var(--accent-light); }
  #query-list { flex: 1; overflow-y: auto; padding: 8px; }
  #query-list::-webkit-scrollbar { width: 4px; }
  #query-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .query-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 3px; transition: background .15s, transform .12s; }
  .query-item:hover { background: var(--bg); transform: translateX(2px); }
  .query-item.active { background: var(--accent-light); }
  .query-item:active { transform: scale(.97); }
  .qi-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .qi-query { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qi-time { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .qi-meta { font-size: 11px; color: var(--text3); display: flex; gap: 10px; }
  .qi-badge { font-size: 9px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
  .qi-badge.ok { background: #e8f8ed; color: #248a3d; }
  .qi-badge.warn { background: #fff3e0; color: #b86300; }
  .qi-badge.err { background: #ffe5e3; color: #bf2d1f; }
  @media (prefers-color-scheme: dark) {
    .qi-badge.ok { background: rgba(48,209,88,.15); color: #30d158; }
    .qi-badge.warn { background: rgba(255,149,0,.15); color: #ff9f0a; }
    .qi-badge.err { background: rgba(255,59,48,.15); color: #ff453a; }
  }
  #left-footer { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text3); }
  #right { flex: 1; overflow-y: auto; padding: 28px 32px; }
  #right::-webkit-scrollbar { width: 6px; }
  #right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); gap: 8px; }
  .empty-state .icon { font-size: 56px; opacity: .6; }
  .empty-state .label { font-size: 14px; font-weight: 500; }
  .empty-state .sublabel { font-size: 12px; opacity: .7; }
  .loading { text-align: center; padding: 60px 0; color: var(--text3); font-size: 13px; }
  .detail-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .detail-header .query-text { font-size: 20px; font-weight: 650; letter-spacing: -.02em; line-height: 1.3; margin-bottom: 6px; }
  .detail-header .query-meta { font-size: 12px; color: var(--text3); display: flex; gap: 18px; }
  .error-section-head { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .error-section-head .count { font-size: 11px; font-weight: 500; padding: 1px 8px; border-radius: 20px; background: rgba(255,59,48,.1); color: var(--red); }
  .error-item { background: rgba(255,59,48,.04); border: 1px solid rgba(255,59,48,.12); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; font-size: 13px; transition: background .15s; }
  .error-item:hover { background: rgba(255,59,48,.07); }
  .error-item .err-type { font-weight: 600; color: var(--red); font-size: 12px; margin-bottom: 2px; }
  .error-item .err-msg { color: var(--text2); }
  .error-item .err-meta { color: var(--text3); font-size: 11px; margin-top: 4px; }
  .steps-section-head { font-size: 14px; font-weight: 600; margin: 20px 0 12px; display: flex; align-items: center; gap: 6px; }
  .step-card {
    background: var(--card); backdrop-filter: blur(10px);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 3px var(--shadow);
    transition: box-shadow .2s, transform .12s;
  }
  .step-card:hover { box-shadow: 0 4px 12px var(--shadow-lg); }
  .step-card.degraded { border-left: 3px solid var(--orange); }
  .step-card.failed { border-left: 3px solid var(--red); }
  .step-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .step-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .step-status { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .step-status.ok { background: rgba(48,209,88,.1); color: var(--green); }
  .step-status.warn { background: rgba(255,149,0,.12); color: var(--orange); }
  .step-status.err { background: rgba(255,59,48,.1); color: var(--red); }
  .step-elapsed { font-size: 11px; color: var(--text3); }
  .step-data { font-size: 12px; color: var(--text2); max-height: 320px; overflow-y: auto; }
  .step-data::-webkit-scrollbar { width: 4px; }
  .step-data::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .step-data pre {
    background: var(--bg); border-radius: 8px; padding: 12px 14px; font-size: 11px; line-height: 1.5;
    overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    border: 1px solid var(--border);
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
  }
  /* Chunk modal */
  .chunk-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:100; backdrop-filter:blur(4px); }
  .chunk-panel { position:fixed; top:10%; left:50%; transform:translateX(-50%); width:700px; max-width:90vw; max-height:80vh; background:var(--card); border-radius:16px; padding:24px; overflow-y:auto; z-index:101; box-shadow:0 20px 60px var(--shadow-lg); border:1px solid var(--border); }
  .chunk-panel h3 { font-size:15px; font-weight:600; margin-bottom:12px; }
  .chunk-panel .cp-meta { font-size:12px; color:var(--text3); margin-bottom:12px; display:flex; gap:14px; flex-wrap:wrap; }
  .chunk-panel .cp-section { font-size:12px; color:var(--text2); background:var(--bg); padding:6px 10px; border-radius:6px; margin-bottom:10px; }
  .chunk-panel .cp-text { font-size:13px; line-height:1.6; white-space:pre-wrap; background:var(--bg); border-radius:8px; padding:14px; max-height:350px; overflow-y:auto; border:1px solid var(--border); }
  .chunk-panel .close-btn { float:right; background:none; border:none; font-size:20px; color:var(--text3); cursor:pointer; padding:4px 8px; border-radius:6px; }
  .chunk-panel .close-btn:hover { background:var(--bg); }
  .chunk-link { color:var(--accent); cursor:pointer; text-decoration:underline; font-size:11px; }
  .chunk-link:hover { opacity:.7; }
</style>
</head>
<body>

<div id="left">
  <div id="left-header">
    <h1>&#x1F4CA; Pipeline Diagnostics</h1>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('qa')" id="tab-qa">💬 对话管线</button>
      <button class="tab-btn" onclick="switchTab('chunk')" id="tab-chunk">📐 文档切分</button>
    </div>
    <input id="search" placeholder="搜索查询..." spellcheck="false" />
    <div class="list-bar">
      <span class="list-count" id="list-count">0 条记录</span>
      <button id="refresh-btn" onclick="currentTab === 'qa' ? loadIndex() : loadChunkDocs()">刷新</button>
    </div>
  </div>
  <div id="query-list"></div>
  <div id="chunk-doc-list" style="display:none;flex:1;overflow-y:auto;padding:8px;"></div>
  <div id="left-footer">实时数据  · 点击查询查看管线详情</div>
</div>

<div id="right">
  <div class="empty-state">
    <div class="icon">&#x1F4E1;</div>
    <div class="label">选择一个查询</div>
    <div class="sublabel">点击左侧记录查看管线详情</div>
  </div>
</div>

<div id="chunk-overlay" class="chunk-overlay" onclick="closeChunk()"></div>
<div id="chunk-panel" class="chunk-panel" style="display:none">
  <button class="close-btn" onclick="closeChunk()">&times;</button>
  <h3 id="cp-head">Chunk</h3>
  <div class="cp-meta" id="cp-meta"></div>
  <div class="cp-section" id="cp-section"></div>
  <div class="cp-text" id="cp-text"></div>
</div>

<script>
/* ===== App ===== */
var STEP_ICONS = { rejected: '\u{1F6AB}', rewrite: '\u{1F52E}', intent: '\u{1F3AF}', retrieval: '\u{1F50D}', topk: '\u{1F4E6}', prompt: '\u{1F4DD}', stream: '\u{1F4E1}', degraded: '\u{26A1}' };
var STEP_LABELS = { rejected: 'PII 拦截', rewrite: '查询改写', intent: '意图分类', retrieval: '检索', topk: '最终片段', prompt: 'Prompt 注入', stream: 'SSE 流', degraded: '降级事件' };
var currentId = null;

function loadIndex() {
  fetch('/api/v1/diag/index')
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(index) {
      renderList(index);
      document.getElementById('list-count').textContent = index.length + ' 条记录';
    })
    .catch(function(e) {
      document.getElementById('query-list').innerHTML = '<div class="loading"><div style="font-size:28px;margin-bottom:8px">⚠️</div>无法连接后端: ' + e.message + '</div>';
    });
}

function renderList(index) {
  var container = document.getElementById('query-list');
  var searchQ = document.getElementById('search').value.toLowerCase();
  var html = '';
  for (var i = 0; i < index.length; i++) {
    var item = index[i];
    if (searchQ && item.query.toLowerCase().indexOf(searchQ) < 0) continue;
    var hasErr = item.errors && item.errors.length > 0;
    var degraded = hasErr || (item.steps && item.steps.indexOf('degraded') >= 0);
    var badgeCls = hasErr ? 'err' : degraded ? 'warn' : 'ok';
    var badgeText = hasErr ? '异常' : degraded ? '降级' : '正常';
    var time = (item.timestamp && item.timestamp.split('T')[1]) ? item.timestamp.split('T')[1].slice(0,5) : (item.timestamp ? item.timestamp.slice(11,16) : '');
    html += '<div class="query-item' + (item.id === currentId ? ' active' : '') + '" onclick="loadDetail(\'' + item.id + '\')"><div class="qi-top">';
    html += '<span class="qi-badge ' + badgeCls + '">' + badgeText + '</span>';
    html += '<span class="qi-query">' + esc(item.query) + '</span><span class="qi-time">' + time + '</span></div>';
    html += '<div class="qi-meta">';
    if (item.kbs) html += '<span>📁 ' + item.kbs.join(',') + '</span>';
    if (item.topk_count) html += '<span>🔝 Top' + item.topk_count + '</span>';
    if (item.pipeline_elapsed_ms) html += '<span>⏱ ' + item.pipeline_elapsed_ms + 'ms</span>';
    html += '</div></div>';
  }
  container.innerHTML = html || '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">无匹配记录</div>';
}

function loadDetail(id) {
  currentId = id;
  document.getElementById('right').innerHTML = '<div class="loading">⏳ 加载中...</div>';
  document.querySelectorAll('.query-item').forEach(function(el) {
    el.classList.toggle('active', (el.getAttribute('onclick')||'').indexOf(id) >= 0);
  });
  loadIndex();
  fetch('/api/v1/diag/detail/' + encodeURIComponent(id))
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) { renderDetail(data); })
    .catch(function(e) {
      document.getElementById('right').innerHTML = '<div class="loading"><div style="font-size:28px;margin-bottom:8px">⚠️</div>无法加载详情: ' + e.message + '</div>';
    });
}

function renderDetail(data) {
  var html = '';
  html += '<div class="detail-header"><div class="query-text">' + esc(data.query) + '</div>';
  html += '<div class="query-meta">';
  html += '<span>🕐 ' + (data.timestamp || '') + '</span>';
  if (data.pipeline_elapsed_ms != null) html += '<span>⏱ 总耗时 ' + (data.pipeline_elapsed_ms/1000).toFixed(1) + 's</span>';
  if (data.conversation_id) html += '<span>💬 ' + data.conversation_id.slice(0,8) + '</span>';
  html += '</div></div>';

  if (data.errors && data.errors.length > 0) {
    html += '<div><div class="error-section-head">⚠️ 错误与降级 <span class="count">' + data.errors.length + '</span></div>';
    for (var i = 0; i < data.errors.length; i++) {
      var err = data.errors[i];
      html += '<div class="error-item"><div class="err-type">' + esc(err.type) + ' · ' + esc(err.step) + '</div>';
      html += '<div class="err-msg">' + esc(err.message) + '</div>';
      html += '<div class="err-meta">重试 ' + (err.retried || 0) + ' 次 · 降级: ' + (err.degraded ? '是' : '否') + ' · ' + (err.elapsed_ms || 0) + 'ms</div></div>';
    }
    html += '</div>';
  }

  if (data.steps) {
    var entries = Object.entries(data.steps);
    if (entries.length > 0) {
      html += '<div class="steps-section-head">📋 管线步骤</div>';
      for (var s = 0; s < entries.length; s++) {
        var stepName = entries[s][0];
        var stepData = entries[s][1];
        var hasStepErr = data.errors && data.errors.some(function(e) { return e.step === stepName; });
        var degradedFlag = stepData && stepData.degraded;
        var stepCls = hasStepErr ? 'failed' : degradedFlag ? 'degraded' : '';
        var icon = STEP_ICONS[stepName] || '📌';
        var label = STEP_LABELS[stepName] || stepName;
        var statusText = hasStepErr ? '失败' : degradedFlag ? '降级' : '正常';
        var statusCls = hasStepErr ? 'err' : degradedFlag ? 'warn' : 'ok';

        html += '<div class="step-card ' + stepCls + '"><div class="step-header">';
        html += '<div class="step-name">' + icon + ' ' + label + ' <span class="step-status ' + statusCls + '">' + statusText + '</span></div>';
        html += '</div>';

        if (stepData) {
          html += renderStepBody(stepName, stepData);
        }
        html += '</div>';
      }
    }
  }
  document.getElementById('right').innerHTML = html || '<div class="loading">无步骤数据</div>';
}

function renderStepBody(stepName, stepData) {
  if (stepName === 'retrieval') return renderRetrieval(stepData);
  if (stepName === 'topk') return renderTopK(stepData);
  if (stepName === 'prompt') return renderPrompt(stepData);
  if (stepName === 'stream') return renderStream(stepData);
  if (stepName === 'rewrite') return renderRewrite(stepData);
  if (stepName === 'intent') return renderIntent(stepData);
  if (stepName === 'rejected') return renderRejected(stepData);
  if (stepName === 'degraded') return renderDegraded(stepData);
  return renderRawJson(stepData);
}

/* ---------- Step renderers ---------- */

function fmtPct(v) {
  if (v == null) return '-';
  return (v * 100).toFixed(2) + '%';
}
function fmtMs(v) {
  if (v == null) return '-';
  return v.toFixed(1) + 'ms';
}

function renderRetrieval(data) {
  if (!(data instanceof Array)) return renderRawJson(data);
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    html += '<div style="font-size:12px;font-weight:600;margin:8px 0 6px;color:var(--text2)">第 ' + (i+1) + ' 轮检索: ' + esc(r.sub_query||'') + '</div>';
    // Embedding info
    if (r.embedding) {
      var e = r.embedding;
      html += '<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text3);margin-bottom:6px">';
      html += '<span>📐 向量维度 ' + esc(e.dims||'') + '</span>';
      html += '<span>⏱ ' + fmtMs(e.elapsed_ms) + '</span>';
      if (e.degraded) html += '<span style="color:var(--orange)">⚠ 降级(零向量)</span>';
      html += '</div>';
    }
    // Search candidates table
    var cands = r.search_candidates || [];
    if (cands.length > 0) {
      html += '<table style="width:100%;font-size:12px;border-collapse:collapse;margin-bottom:8px">';
      html += '<tr style="color:var(--text3);font-size:10px"><th style="text-align:left;padding:3px 6px;border-bottom:1px solid var(--border)">Chunk</th><th style="text-align:right;padding:3px 6px;border-bottom:1px solid var(--border)">相似度</th><th style="text-align:left;padding:3px 6px;border-bottom:1px solid var(--border)">标题</th></tr>';
      for (var ci = 0; ci < cands.length; ci++) {
        var c = cands[ci];
        html += '<tr><td style="padding:3px 6px;border-bottom:1px solid var(--border)"><span class="chunk-link" onclick="openChunk(\'' + esc(c.chunk_id||'') + '\')">' + esc((c.chunk_id||'').slice(0,12)) + '</span></td>';
        html += '<td style="padding:3px 6px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums">' + fmtPct(c.score) + '</td>';
        html += '<td style="padding:3px 6px;border-bottom:1px solid var(--border)">' + esc(c.title||'') + '</td></tr>';
      }
      html += '</table>';
    }
    // Rerank
    if (r.rerank) {
      var rr = r.rerank;
      html += '<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text3);margin-bottom:4px">';
      html += '<span>🔄 重排: ' + (rr.before_count||0) + ' → ' + (rr.after_count||0) + ' 条</span>';
      if (rr.degraded) html += '<span style="color:var(--orange)">⚠ 降级(跳过重排)</span>';
      if (rr.elapsed_ms != null) html += '<span>⏱ ' + fmtMs(rr.elapsed_ms) + '</span>';
      html += '</div>';
    }
    // MMR
    if (r.mmr) {
      var m = r.mmr;
      html += '<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text3)">';
      html += '<span>🎯 MMR(λ=' + m.lambda + '): 选 ' + (m.selected_count||0) + ' 条, 去重 ' + (m.rejected_count||0) + ' 条</span>';
      if (m.elapsed_ms != null) html += '<span>⏱ ' + fmtMs(m.elapsed_ms) + '</span>';
      html += '</div>';
    }
    // Total
    if (r.total_elapsed_ms != null) {
      html += '<div style="font-size:11px;color:var(--text3);margin-top:4px">子查询耗时: ' + fmtMs(r.total_elapsed_ms) + '</div>';
    }
  }
  return html;
}

function renderTopK(data) {
  var chunks = data.chunks || [];
  if (chunks.length === 0) return '<div style="font-size:12px;color:var(--text3);padding:4px 0">无匹配片段</div>';
  var html = '<div style="font-size:12px;color:var(--text3);margin-bottom:6px">最终入选 <strong>' + chunks.length + '</strong> 个片段:</div>';
  html += '<table style="width:100%;font-size:12px;border-collapse:collapse">';
  html += '<tr style="color:var(--text3);font-size:10px"><th style="text-align:left;padding:3px 6px;border-bottom:1px solid var(--border)">#</th><th style="text-align:right;padding:3px 6px;border-bottom:1px solid var(--border)">分数</th><th style="text-align:left;padding:3px 6px;border-bottom:1px solid var(--border)">标题</th><th style="text-align:left;padding:3px 6px;border-bottom:1px solid var(--border)">来源</th></tr>';
  for (var i = 0; i < chunks.length; i++) {
    var c = chunks[i];
    html += '<tr><td style="padding:3px 6px;border-bottom:1px solid var(--border);color:var(--text3)">' + (i+1) + '</td>';
    html += '<td style="padding:3px 6px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums">' + fmtPct(c.score) + '</td>';
    html += '<td style="padding:3px 6px;border-bottom:1px solid var(--border)"><span class="chunk-link" onclick="openChunk(\'' + esc(c.chunk_id||'') + '\')">' + esc(c.title||'') + '</span></td>';
    html += '<td style="padding:3px 6px;border-bottom:1px solid var(--border);color:var(--text3)">' + esc(c.source||'') + '</td></tr>';
    if (c.text_preview) {
      html += '<tr><td colspan="4" style="padding:2px 6px 8px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border)">' + esc(c.text_preview.slice(0,200)) + (c.text_preview.length>200?'...':'') + '</td></tr>';
    }
  }
  html += '</table>';
  if (data.elapsed_ms != null) html += '<div style="font-size:11px;color:var(--text3);margin-top:4px">⏱ ' + fmtMs(data.elapsed_ms) + '</div>';
  return html;
}

function renderPrompt(data) {
  var html = '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text3)">';
  html += '<span>📏 系统提示 ' + (data.system_prompt_chars||0) + ' 字符</span>';
  html += '<span>📄 检索片段 ' + (data.topk_chars||0) + ' 字符</span>';
  html += '<span>📝 总长度 ' + (data.total_chars||0) + ' 字符</span>';
  html += '<span>💬 ' + (data.message_count||0) + ' 条消息</span>';
  html += '</div>';
  return html;
}

function renderStream(data) {
  var html = '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text3)">';
  if (data.first_token_ms != null) html += '<span>⚡ 首 token ' + fmtMs(data.first_token_ms) + '</span>';
  if (data.thinking_chars) html += '<span>💭 思考 ' + data.thinking_chars + ' 字符</span>';
  if (data.answer_chars) html += '<span>💬 回答 ' + data.answer_chars + ' 字符</span>';
  if (data.total_tokens != null) html += '<span>🔤 共 ' + data.total_tokens + ' token</span>';
  if (data.total_ms != null) html += '<span>⏱ 流式耗时 ' + fmtMs(data.total_ms) + '</span>';
  if (data.error) html += '<span style="color:var(--red)">❌ ' + esc(data.error) + '</span>';
  html += '</div>';
  return html;
}

function renderRewrite(data) {
  var html = '<div style="font-size:12px;color:var(--text3)">';
  if (data.original) html += '<div style="margin-bottom:4px">原始: ' + esc(data.original) + '</div>';
  if (data.rewritten) html += '<div style="margin-bottom:4px">改写: ' + esc(data.rewritten) + '</div>';
  if (data.sub_questions && data.sub_questions.length > 0) {
    html += '<div>子问题:';
    for (var i = 0; i < data.sub_questions.length; i++) {
      html += '<div style="padding-left:16px;margin-top:2px">' + (i+1) + '. ' + esc(data.sub_questions[i]) + '</div>';
    }
    html += '</div>';
  }
  if (data.elapsed_ms != null) html += '<div style="margin-top:4px">⏱ ' + fmtMs(data.elapsed_ms) + '</div>';
  html += '</div>';
  return html;
}

function renderIntent(data) {
  if (!(data instanceof Array)) return renderRawJson(data);
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var item = data[i];
    html += '<div style="font-size:12px;margin-bottom:6px"><span style="color:var(--text2);font-weight:500">' + esc(item.sub_query||'') + '</span>';
    if (item.intent_type) html += ' <span style="color:var(--text3)">→ </span><span>' + item.intent_type + '</span>';
    html += '</div>';
    if (item.kbs && item.kbs.length > 0) {
      for (var j = 0; j < item.kbs.length; j++) {
        var kb = item.kbs[j];
        html += '<div style="padding-left:16px;font-size:11px;color:var(--text3);margin-bottom:2px">📁 ' + esc(kb.name||kb.kb_id||'') + ' (置信度: ' + fmtPct(kb.confidence) + ')</div>';
      }
    }
  }
  return html;
}

function renderRejected(data) {
  return '<div style="font-size:12px;color:var(--red)">🚫 PII 拦截: ' + esc(data.reason||'') + (data.details ? ' · ' + esc(data.details.join(', ')) : '') + '</div>';
}

function renderDegraded(data) {
  var html = '<div style="font-size:12px;color:var(--orange)">';
  if (data.providers) html += '<div>⚡ 降级服务: ' + esc(data.providers.join(', ')) + '</div>';
  if (data.chat_degraded) html += '<div>💬 聊天降级</div>';
  html += '</div>';
  return html;
}

function renderRawJson(data) {
  var json = JSON.stringify(data, null, 2);
  if (json.length > 2000) json = json.slice(0,2000) + '\n... (truncated)';
  return '<div class="step-data"><pre>' + esc(json) + '</pre></div>';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* Chunk lookup */
function openChunk(chunkId) {
  document.getElementById('chunk-overlay').style.display = 'block';
  document.getElementById('chunk-panel').style.display = 'block';
  document.getElementById('cp-head').textContent = '🔍 ' + chunkId;
  document.getElementById('cp-meta').innerHTML = '<span>⏳ 加载中...</span>';
  document.getElementById('cp-section').textContent = '';
  document.getElementById('cp-text').textContent = '';

  fetch('/api/v1/diag/chunks?ids=' + encodeURIComponent(chunkId))
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      if (data.length === 0) { document.getElementById('cp-meta').innerHTML = '<span>未找到该 chunk</span>'; return; }
      var c = data[0];
      document.getElementById('cp-meta').innerHTML = '<span>📄 ' + esc(c.filename) + '</span><span>🔗 ' + esc(c.document_id.slice(0,8)) + '</span><span>📁 ' + esc(c.kb_id) + '</span><span>🔐 ' + c.visibility + '</span>';
      document.getElementById('cp-section').textContent = c.section_path ? '📍 ' + c.section_path : '';
      document.getElementById('cp-text').textContent = c.text;
    })
    .catch(function(e) {
      document.getElementById('cp-meta').innerHTML = '<span style="color:var(--red)">⚠ 加载失败: ' + e.message + '</span>';
    });
}
function closeChunk() {
  document.getElementById('chunk-overlay').style.display = 'none';
  document.getElementById('chunk-panel').style.display = 'none';
}

document.getElementById('search').addEventListener('input', function() {
  currentTab === 'qa' ? loadIndex() : loadChunkDocs();
});

/* ===== Tab system ===== */
var currentTab = 'qa';

function switchTab(name) {
  currentTab = name;
  document.getElementById('tab-qa').classList.toggle('active', name === 'qa');
  document.getElementById('tab-chunk').classList.toggle('active', name === 'chunk');
  document.getElementById('query-list').style.display = name === 'qa' ? '' : 'none';
  document.getElementById('chunk-doc-list').style.display = name === 'chunk' ? '' : 'none';
  document.getElementById('search').style.display = name === 'qa' ? '' : 'none';
  document.getElementById('refresh-btn').setAttribute('onclick', name === 'qa' ? 'loadIndex()' : 'loadChunkDocs()');
  if (name === 'qa') loadIndex();
  else if (name === 'chunk') loadChunkDocs();
  document.getElementById('right').innerHTML = '<div class="empty-state"><div class="icon">' + (name === 'qa' ? '📡' : '📐') + '</div><div class="label">' + (name === 'qa' ? '选择一个查询' : '选择一个文档') + '</div><div class="sublabel">' + (name === 'qa' ? '点击左侧记录查看管线详情' : '点击文档查看切分详情') + '</div></div>';
}

/* ===== Chunk doc list ===== */
function loadChunkDocs() {
  fetch('/api/v1/diag/chunk-docs')
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(docs) {
      renderChunkDocList(docs);
      document.getElementById('list-count').textContent = docs.length + ' 个文档';
    })
    .catch(function(e) {
      document.getElementById('chunk-doc-list').innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">⚠ 加载失败: ' + e.message + '</div>';
    });
}

function renderChunkDocList(docs) {
  var html = '';
  for (var i = 0; i < docs.length; i++) {
    var d = docs[i];
    html += '<div class="query-item' + (currentDocId === d.document_id ? ' active' : '') + '" onclick="loadChunkDocDetail(\'' + esc(d.document_id) + '\')">';
    html += '<div class="qi-top"><span class="qi-query">📄 ' + esc(d.filename) + '</span></div>';
    html += '<div class="qi-meta">';
    html += '<span>📐 ' + d.section_count + ' 章节</span>';
    html += '<span>✂ ' + d.chunk_count + ' 个 chunk</span>';
    html += '<span>🔗 ' + esc(d.document_id.slice(0,12)) + '</span>';
    html += '</div></div>';
  }
  document.getElementById('chunk-doc-list').innerHTML = html || '<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">暂无文档切分数据，上传文档后再来查看</div>';
}

var currentDocId = null;

function loadChunkDocDetail(docId) {
  currentDocId = docId;
  document.getElementById('right').innerHTML = '<div class="loading">⏳ 加载切分数据...</div>';
  loadChunkDocs();
  fetch('/api/v1/diag/chunk-doc/' + encodeURIComponent(docId))
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) { renderChunkDocDetail(data); })
    .catch(function(e) {
      document.getElementById('right').innerHTML = '<div class="loading"><div style="font-size:28px;margin-bottom:8px">⚠️</div>无法加载: ' + e.message + '</div>';
    });
}

function renderChunkDocDetail(data) {
  var html = '';
  html += '<div class="detail-header"><div class="query-text">📄 ' + esc(data.filename) + '</div>';
  html += '<div class="query-meta">';
  html += '<span>📐 ' + (data.sections ? data.sections.length : 0) + ' 章节</span>';
  html += '<span>✂ ' + (data.chunks ? data.chunks.length : 0) + ' 个 chunk</span>';
  html += '<span>🔗 ' + esc((data.document_id||'').slice(0,12)) + '</span>';
  html += '</div></div>';

  /* Sections */
  var sections = data.sections || [];
  html += '<div class="steps-section-head">📐 文档结构（' + sections.length + ' 个章节）</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px">';
  for (var si = 0; si < sections.length; si++) {
    var s = sections[si];
    html += '<div class="step-card" style="padding:12px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">' + (s.level ? '#'.repeat(s.level) + ' ' : '') + esc(s.title) + '</div>';
    html += '<div style="font-size:11px;color:var(--text3);margin-bottom:4px">' + (s.elements||[]).length + ' 个元素</div>';
    var elems = s.elements || [];
    for (var ei = 0; ei < elems.length; ei++) {
      var e = elems[ei];
      var tag = e.is_atomic ? ' style="background:rgba(255,149,0,.1);color:var(--orange);"' : ' style="background:var(--bg);color:var(--text3);"';
      html += '<span ' + tag + 'style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;margin:2px 2px 2px 0;font-weight:500">' + esc(e.type) + (e.is_atomic ? ' 🔒' : '') + '</span>';
    }
    html += '</div>';
  }
  html += '</div>';

  /* Chunks */
  var chunks = data.chunks || [];
  html += '<div class="steps-section-head">✂ Chunk 列表（' + chunks.length + ' 个）</div>';
  for (var ci = 0; ci < chunks.length; ci++) {
    var c = chunks[ci];
    html += '<div class="step-card"><div class="step-header">';
    html += '<div class="step-name"><span style="color:var(--text3)">#' + (c.index+1) + '</span> ' + esc(c.title||'无标题') + '</div>';
    html += '<div class="step-elapsed">' + c.full_len + ' 字符</div></div>';
    html += '<div style="font-size:11px;color:var(--text3);margin-bottom:6px">';
    if (c.section_path && c.section_path.length > 0) {
      html += '📍 ' + esc(c.section_path.join(' > '));
    }
    html += '</div>';
    html += '<div style="font-size:12px;line-height:1.5;color:var(--text2);white-space:pre-wrap;background:var(--bg);border-radius:8px;padding:10px;border:1px solid var(--border)">' + esc(c.text_preview) + (c.full_len > 400 ? '...' : '') + '</div>';
    html += '</div>';
  }

  document.getElementById('right').innerHTML = html;
}
</script>
<script>loadIndex();</script>
</body>
</html>
